<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Risk Command Center</title>
<script src="shared.js"></script>
<style>
:root {
  --bg: #0D1117;
  --surface: #161B22;
  --border: #21262D;
  --text: #E6EDF3;
  --muted: #8B949E;
  --kpi: #3FB950;
  --kri: #F85149;
  --blue: #388BFD;
  --gold: #D29922;
  --purple: #BC8CFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  height: 60px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 24px;
}
.header-logo { font-weight: 700; font-size: 16px; white-space: nowrap; color: var(--text); }
.header-logo span { color: var(--blue); }
.header-nav { display: flex; gap: 4px; flex: 1; }
.nav-link {
  padding: 6px 14px; border-radius: 6px; text-decoration: none;
  font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s;
}
.nav-link:hover { color: var(--text); background: var(--border); }
.nav-link.active { color: var(--text); background: var(--border); }
.nav-link.analytics { color: var(--purple); }
.nav-link.analytics:hover { background: rgba(188,140,255,.1); }
#lang-switcher { display: flex; gap: 4px; }
.lang-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); padding: 4px 8px; border-radius: 5px;
  cursor: pointer; font-size: 12px; transition: all .15s;
}
.lang-btn:hover, .lang-btn.active { border-color: var(--blue); color: var(--text); background: rgba(56,139,253,.1); }
.header-user { display: flex; align-items: center; gap: 10px; margin-left: 8px; }
.user-greeting { font-size: 12px; color: var(--muted); white-space: nowrap; }
.logout-btn {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); padding: 4px 12px; border-radius: 5px;
  cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s;
  white-space: nowrap;
}
.logout-btn:hover { border-color: var(--kri); color: var(--kri); }

/* Main */
.main { max-width: 1400px; margin: 0 auto; padding: 24px; }
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}

/* Gauge cards */
.gauge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.gauge-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 20px 20px;
  display: flex; flex-direction: column; align-items: center;
  border-top: 3px solid transparent; transition: transform .2s;
}
.gauge-card:hover { transform: translateY(-2px); }
.gauge-svg { width: 120px; height: 120px; }
.gauge-track { fill: none; stroke: var(--border); stroke-width: 10; }
.gauge-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); }
.gauge-center { fill: var(--text); font-size: 20px; font-weight: 700; }
.gauge-name { margin-top: 12px; font-size: 13px; font-weight: 600; color: var(--text); text-align: center; }
.gauge-subtitle { font-size: 11px; color: var(--muted); text-align: center; margin-top: 2px; }
.gauge-status { margin-top: 8px; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; }

/* Stats bar */
.stats-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 24px; margin-bottom: 24px;
  display: flex; gap: 0; justify-content: space-around; align-items: center;
}
.stat-item { text-align: center; flex: 1; }
.stat-item + .stat-item { border-left: 1px solid var(--border); }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }

/* Filters */
.filters { margin-bottom: 24px; display: flex; flex-direction: column; gap: 12px; }
.search-input {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 8px 14px; border-radius: 8px;
  font-size: 13px; width: 100%; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }
.filter-tabs { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.filter-tab {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); color: var(--muted);
  background: transparent; transition: all .15s; white-space: nowrap;
}
.filter-tab:hover { border-color: var(--blue); color: var(--text); }
.filter-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.improvement-toggle {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--gold); color: var(--gold);
  background: transparent; transition: all .15s; margin-left: auto;
}
.improvement-toggle.active { background: rgba(210,153,34,.15); }
.improvement-toggle:hover { background: rgba(210,153,34,.15); }

/* Indicator grid */
.domain-section { margin-bottom: 32px; }
.domain-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.domain-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.domain-title { font-size: 13px; font-weight: 600; color: var(--text); }
.domain-subtitle { font-size: 12px; color: var(--muted); }
.domain-label { font-size: 11px; font-weight: 700; background: var(--border); color: var(--muted); padding: 2px 8px; border-radius: 4px; }
.indicator-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

.indicator-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; transition: border-color .15s;
}
.indicator-card:hover { border-color: #30363D; }
.indicator-card.improvement { border-left: 3px solid var(--gold); }
.card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
  white-space: nowrap; flex-shrink: 0;
}
.badge-kpi { background: rgba(63,185,80,.15); color: var(--kpi); border: 1px solid rgba(63,185,80,.3); }
.badge-kri { background: rgba(248,81,73,.15); color: var(--kri); border: 1px solid rgba(248,81,73,.3); }
.badge-improvement { background: rgba(210,153,34,.15); color: var(--gold); border: 1px solid rgba(210,153,34,.3); }
.card-description { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

.score-bar-container { margin-bottom: 8px; }
.score-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.score-pct { font-size: 13px; font-weight: 700; }
.score-status-label { font-size: 11px; font-weight: 500; }
.score-bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }

.card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; }
.meta-value { color: var(--text); font-weight: 600; }
.meta-target { color: var(--muted); }

.card-rationale { font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; line-height: 1.6; }
.rationale-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }

.card-scores { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.score-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
  border: 1px solid var(--border); color: var(--muted);
}
.score-tag.hygiene { border-color: rgba(56,139,253,.4); color: var(--blue); background: rgba(56,139,253,.08); }
.score-tag.resilience { border-color: rgba(63,185,80,.4); color: var(--kpi); background: rgba(63,185,80,.08); }
.score-tag.human { border-color: rgba(210,153,34,.4); color: var(--gold); background: rgba(210,153,34,.08); }
.score-tag.risk { border-color: rgba(248,81,73,.4); color: var(--kri); background: rgba(248,81,73,.08); }

/* No results */
.no-results { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }

/* Footer */
.footer {
  border-top: 1px solid var(--border); padding: 24px;
  text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px;
}
.footer-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
.footer-nav a { color: var(--muted); text-decoration: none; }
.footer-nav a:hover { color: var(--text); }
.footer-nav a.analytics { color: var(--purple); }
.footer a { color: var(--blue); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

@media (max-width: 960px) {
  .header { padding: 0 12px; gap: 8px; }
  .logo-text { display: none; }
  .user-greeting { display: none; }
  #lang-switcher { display: none; }
  .nav-link { padding: 5px 8px; font-size: 12px; }
}
@media (max-width: 900px) {
  .gauge-grid { grid-template-columns: repeat(2, 1fr); }
  .indicator-grid { grid-template-columns: 1fr; }
  .stats-bar { flex-wrap: wrap; gap: 16px; }
  .stat-item + .stat-item { border-left: none; border-top: 1px solid var(--border); padding-top: 16px; width: 100%; }
}
@media (max-width: 600px) {
  .gauge-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<script>requireAuth();</script>

<header class="header">
  <div class="header-logo"><span>⚡</span><span class="logo-text"> Cyber Risk Command Center</span></div>
  <nav class="header-nav">
    <a href="index.html" class="nav-link active" data-i18n="nav_dashboard">Dashboard</a>
    <a href="charts.html" class="nav-link analytics" data-i18n="nav_analytics">Analytics</a>
    <a href="docs.html" class="nav-link" data-i18n="nav_docs">Documentação</a>
    <a href="admin.html" class="nav-link admin-only" data-i18n="nav_admin">Admin</a>
  </nav>
  <div id="lang-switcher"></div>
  <div class="header-user">
    <span class="user-greeting" id="user-greeting"></span>
    <button class="logout-btn" onclick="logout()" data-i18n="logout_btn">Sair</button>
  </div>
</header>

<main class="main">
  <div class="section-label" data-i18n="section_executive">EXECUTIVE SUMMARY</div>

  <!-- Gauge Cards -->
  <div class="gauge-grid" id="gauge-grid">
    <!-- rendered by JS -->
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="stats-bar">
    <!-- rendered by JS -->
  </div>

  <!-- Filters -->
  <div class="filters">
    <input type="text" class="search-input" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="Buscar indicador...">
    <div class="filter-tabs" id="filter-tabs">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- Indicator Sections -->
  <div id="indicators-container">
    <!-- rendered by JS -->
  </div>
</main>

<footer class="footer">
  <div class="footer-nav">
    <a href="index.html" data-i18n="nav_dashboard">Dashboard</a>
    <a href="charts.html" class="analytics" data-i18n="nav_analytics">Analytics</a>
    <a href="docs.html" data-i18n="nav_docs">Documentação</a>
  </div>
  <div data-i18n="footer_created">Criado por Arthur Paixao</div>
  <div style="margin-top:4px;"><a href="https://linkedin.com/in/arthurpaixao/" target="_blank">linkedin.com/in/arthurpaixao/</a></div>
</footer>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let indicatorsData = null;
let activeFilter = 'ALL';
let searchQuery = '';
let showImprovements = false;

const SCORE_COLORS = {
  hygiene: '#388BFD',
  resilience: '#3FB950',
  human: '#D29922',
  risk: '#F85149'
};

const DOMAIN_COLORS = [
  '#388BFD','#3FB950','#D29922','#F85149','#BC8CFF',
  '#58A6FF','#56D364','#E3B341','#FF7B72','#D2A8FF',
  '#79C0FF','#7EE787','#F0883E','#FFA657'
];

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadData() {
  indicatorsData = await loadIndicatorsData();
  render();
}

// Cross-tab auto-update when admin saves changes
window.addEventListener('storage', (e) => {
  if (e.key === 'crcc_data_updated') loadData();
});

// ── Score calculation ─────────────────────────────────────────────────────────
function calcPctLocal(indicator) {
  const { direction, target, warningThreshold, value } = indicator;
  if (value == null) return null;
  if (direction === 'higher_better') return Math.min(100, (value / target) * 100);
  if (target === 0) {
    if (!warningThreshold) return value === 0 ? 100 : 0;
    return Math.max(0, 100 - (value / warningThreshold) * 100);
  }
  if (value <= target) return 100;
  return Math.max(0, 100 - ((value - target) / target * 100));
}

function getStatusColor(pct) {
  if (pct === null) return '#8B949E';
  if (pct >= 85) return '#3FB950';
  if (pct >= 50) return '#D29922';
  return '#F85149';
}

function getStatusLabelLocal(pct) {
  if (pct === null) return '—';
  if (pct >= 85) return t('on_target');
  if (pct >= 50) return t('warning');
  return t('alert');
}

function calcExecScore(scoreKey) {
  const all = indicatorsData.categories.flatMap(c => c.indicators);
  const relevant = all.filter(i => !i.isImprovement && i.scores && i.scores.includes(scoreKey));
  if (!relevant.length) return 0;
  const pcts = relevant.map(i => calcPctLocal(i)).filter(p => p !== null);
  return pcts.length ? pcts.reduce((a, b) => a + b, 0) / pcts.length : 0;
}

// ── Gauge SVG ─────────────────────────────────────────────────────────────────
function buildGaugeSVG(pct, color) {
  const r = 50, cx = 60, cy = 60;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `
    <svg class="gauge-svg" viewBox="0 0 120 120">
      <circle class="gauge-track" cx="${cx}" cy="${cy}" r="${r}" />
      <circle class="gauge-fill" cx="${cx}" cy="${cy}" r="${r}"
        stroke="${color}"
        stroke-dasharray="${circ}"
        stroke-dashoffset="${circ}"
        data-offset="${offset}"
        style="transform-origin:center;transform:rotate(-90deg);" />
      <text class="gauge-center" x="${cx}" y="${cy+7}" text-anchor="middle" fill="${color}">${Math.round(pct)}%</text>
    </svg>`;
}

// ── Render gauges ─────────────────────────────────────────────────────────────
function renderGauges() {
  const scores = [
    { key: 'hygiene',    nameKey: 'hygiene_score',    subtitleKey: 'hygiene_subtitle',    color: SCORE_COLORS.hygiene },
    { key: 'resilience', nameKey: 'resilience_score', subtitleKey: 'resilience_subtitle', color: SCORE_COLORS.resilience },
    { key: 'human',      nameKey: 'human_score',      subtitleKey: 'human_subtitle',      color: SCORE_COLORS.human },
    { key: 'risk',       nameKey: 'risk_score',       subtitleKey: 'risk_subtitle',       color: SCORE_COLORS.risk }
  ];

  const grid = document.getElementById('gauge-grid');
  grid.innerHTML = scores.map(s => {
    const pct = calcExecScore(s.key);
    const color = getStatusColor(pct);
    const statusLabel = getStatusLabelLocal(pct);
    const iconDef = indicatorsData.scoreDefinitions[s.key];
    return `
      <div class="gauge-card" style="border-top-color:${s.color}">
        ${buildGaugeSVG(pct, s.color)}
        <div class="gauge-name">${iconDef.icon} <span data-i18n="${s.nameKey}">${t(s.nameKey)}</span></div>
        <div class="gauge-subtitle" data-i18n="${s.subtitleKey}">${t(s.subtitleKey)}</div>
        <div class="gauge-status" style="background:${color}20;color:${color}">${statusLabel}</div>
      </div>`;
  }).join('');

  // Animate gauges
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.gauge-fill').forEach(circle => {
        circle.style.setProperty('stroke-dashoffset', circle.dataset.offset + 'px');
      });
    });
  });
}

// ── Render stats bar ──────────────────────────────────────────────────────────
function renderStatsBar() {
  const all = indicatorsData.categories.flatMap(c => c.indicators);
  const nonImprovement = all.filter(i => !i.isImprovement);
  const improvements = all.filter(i => i.isImprovement);
  const kpis = nonImprovement.filter(i => i.type === 'KPI');
  const kris = nonImprovement.filter(i => i.type === 'KRI');
  const kpisOnTarget = kpis.filter(i => calcPctLocal(i) >= 85).length;
  const krisInAlert = kris.filter(i => calcPctLocal(i) < 50).length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item">
      <div class="stat-value" style="color:var(--blue)">${all.length}</div>
      <div class="stat-label" data-i18n="total_indicators">${t('total_indicators')}</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color:var(--kpi)">${kpisOnTarget}/${kpis.length}</div>
      <div class="stat-label" data-i18n="kpis_on_target">${t('kpis_on_target')}</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color:var(--kri)">${krisInAlert}</div>
      <div class="stat-label" data-i18n="kris_in_alert">${t('kris_in_alert')}</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color:var(--gold)">${improvements.length}</div>
      <div class="stat-label" data-i18n="improvements">${t('improvements')}</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" style="color:var(--text)">${indicatorsData.metadata.period}</div>
      <div class="stat-label" data-i18n="period">${t('period')}</div>
    </div>`;
}

// ── Render filters ────────────────────────────────────────────────────────────
function renderFilters() {
  const tabs = document.getElementById('filter-tabs');
  const labels = ['ALL', ...indicatorsData.categories.map(c => c.label)];
  tabs.innerHTML = labels.map(label => `
    <button class="filter-tab${activeFilter === label ? ' active' : ''}" data-label="${label}">
      ${label === 'ALL' ? t('filter_all') : label}
    </button>`).join('') +
    `<button class="improvement-toggle${showImprovements ? ' active' : ''}" id="improvement-toggle">
      ${t('toggle_improvements')}
    </button>`;

  tabs.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.label;
      renderFilters();
      renderIndicators();
    });
  });

  document.getElementById('improvement-toggle').addEventListener('click', () => {
    showImprovements = !showImprovements;
    renderFilters();
    renderIndicators();
  });
}

// ── Render indicator card ─────────────────────────────────────────────────────
function renderCard(ind) {
  const pct = calcPctLocal(ind);
  const color = getStatusColor(pct);
  const pctDisplay = pct !== null ? Math.round(pct) + '%' : '—';
  const statusLabel = getStatusLabelLocal(pct);
  const barWidth = pct !== null ? Math.min(100, pct) : 0;

  const scoreTags = (ind.scores || []).map(s =>
    `<span class="score-tag ${escapeHtml(s)}">${escapeHtml(indicatorsData.scoreDefinitions[s]?.name || s)}</span>`
  ).join('');

  return `
    <div class="indicator-card${ind.isImprovement ? ' improvement' : ''}">
      <div class="card-header">
        <div class="card-title">${escapeHtml(ind.name)}</div>
        <span class="badge badge-${ind.type.toLowerCase()}">${ind.type}</span>
        ${ind.isImprovement ? `<span class="badge badge-improvement">${t('badge_improvement')}</span>` : ''}
      </div>
      <div class="card-description">${escapeHtml(ind.description)}</div>

      <div class="score-bar-container">
        <div class="score-bar-header">
          <span class="score-pct" style="color:${color}">${pctDisplay}</span>
          <span class="score-status-label" style="color:${color}">${statusLabel}</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:${barWidth}%;background:${color}"></div>
        </div>
      </div>

      <div class="card-meta">
        <span><span class="meta-target">${t('value_label')}: </span><span class="meta-value">${escapeHtml(ind.valueDisplay)}</span></span>
        <span><span class="meta-target">${t('target_label')}: </span><span class="meta-value">${escapeHtml(ind.targetDisplay)}</span></span>
      </div>

      ${ind.rationale ? `
        <div class="card-rationale">
          <div class="rationale-label">${t('why_matters')}</div>
          ${escapeHtml(ind.rationale)}
        </div>` : ''}

      ${scoreTags ? `<div class="card-scores">${scoreTags}</div>` : ''}
    </div>`;
}

// ── Render indicators ─────────────────────────────────────────────────────────
function renderIndicators() {
  const container = document.getElementById('indicators-container');
  const q = searchQuery.toLowerCase();

  const filtered = indicatorsData.categories.filter(cat => {
    if (activeFilter !== 'ALL' && cat.label !== activeFilter) return false;
    return true;
  });

  let html = '';
  let anyVisible = false;

  filtered.forEach((cat, i) => {
    let indicators = cat.indicators.filter(ind => {
      if (!showImprovements && ind.isImprovement) return false;
      if (q && !ind.name.toLowerCase().includes(q) &&
              !ind.description.toLowerCase().includes(q) &&
              !cat.label.toLowerCase().includes(q)) return false;
      return true;
    });

    if (!indicators.length) return;
    anyVisible = true;

    const color = DOMAIN_COLORS[i % DOMAIN_COLORS.length];
    html += `
      <div class="domain-section" data-domain="${escapeHtml(cat.label)}">
        <div class="domain-header">
          <div class="domain-dot" style="background:${color}"></div>
          <div class="domain-title">${escapeHtml(cat.name)}</div>
          <div class="domain-label">${escapeHtml(cat.label)}</div>
        </div>
        <div class="indicator-grid">
          ${indicators.map(renderCard).join('')}
        </div>
      </div>`;
  });

  container.innerHTML = anyVisible ? html : `<div class="no-results">${t('no_results')}</div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  renderGauges();
  renderStatsBar();
  renderFilters();
  renderIndicators();
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderIndicators();
});

// ── Lang change ───────────────────────────────────────────────────────────────
document.addEventListener('langchange', () => {
  if (indicatorsData) render();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
const userGreeting = document.getElementById('user-greeting');
if (userGreeting) {
  const userName = getCurrentUser();
  if (userName) userGreeting.textContent = t('welcome_user') + ' ' + userName;
}

loadData().catch(err => {
  document.getElementById('indicators-container').innerHTML =
    `<div class="no-results">${t('error_loading')}</div>`;
  console.error(err);
});
</script>
</body>
</html>
