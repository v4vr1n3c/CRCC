<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Cyber Risk Command Center</title>
<script src="shared.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0D1117; --surface: #161B22; --border: #21262D;
  --text: #E6EDF3; --muted: #8B949E;
  --kpi: #3FB950; --kri: #F85149; --blue: #388BFD; --gold: #D29922; --purple: #BC8CFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

.header {
  position: sticky; top: 0; z-index: 100; height: 60px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 24px;
}
.header-logo { font-weight: 700; font-size: 16px; color: var(--text); white-space: nowrap; }
.header-logo span { color: var(--blue); }
.header-nav { display: flex; gap: 4px; flex: 1; }
.nav-link { padding: 6px 14px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s; }
.nav-link:hover { color: var(--text); background: var(--border); }
.nav-link.active { color: var(--purple); background: rgba(188,140,255,.1); }
.nav-link.dashboard:hover { color: var(--text); }
#lang-switcher { display: flex; gap: 4px; }
.lang-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; transition: all .15s; }
.lang-btn:hover, .lang-btn.active { border-color: var(--blue); color: var(--text); background: rgba(56,139,253,.1); }
.header-user { display: flex; align-items: center; gap: 10px; margin-left: 8px; }
.user-greeting { font-size: 12px; color: var(--muted); white-space: nowrap; }
.logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; white-space: nowrap; }
.logout-btn:hover { border-color: var(--kri); color: var(--kri); }

.main { max-width: 1400px; margin: 0 auto; padding: 24px; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.chart-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 20px; }
.chart-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.chart-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.chart-container { position: relative; }

/* Tabs for category trends */
.tab-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.tab-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: transparent; transition: all .15s; }
.tab-btn:hover { border-color: var(--blue); color: var(--text); }
.tab-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

/* Custom doughnut legend */
.doughnut-legend { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.loading { text-align: center; padding: 80px; color: var(--muted); font-size: 15px; }
.error { text-align: center; padding: 80px; color: var(--kri); font-size: 15px; }

.footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; }
.footer-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
.footer-nav a { color: var(--muted); text-decoration: none; }
.footer-nav a:hover { color: var(--text); }
.footer-nav a.analytics { color: var(--purple); }
.footer a { color: var(--blue); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

@media (max-width: 900px) { .chart-grid-2, .chart-grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<script>requireAuth();</script>

<header class="header">
  <div class="header-logo"><span>⚡</span> Cyber Risk Command Center</div>
  <nav class="header-nav">
    <a href="index.html" class="nav-link dashboard" data-i18n="nav_dashboard">Dashboard</a>
    <a href="charts.html" class="nav-link active" data-i18n="nav_analytics">Analytics</a>
    <a href="docs.html" class="nav-link" data-i18n="nav_docs">Documentação</a>
    <a href="admin.html" class="nav-link" data-i18n="nav_admin">Admin</a>
  </nav>
  <div id="lang-switcher"></div>
  <div class="header-user">
    <span class="user-greeting" id="user-greeting"></span>
    <button class="logout-btn" onclick="logout()" data-i18n="logout_btn">Sair</button>
  </div>
</header>

<main class="main">
  <div class="section-label" data-i18n="section_analytics">ANALYTICS</div>
  <div id="content">
    <div class="loading" data-i18n="loading_data">Carregando dados...</div>
  </div>
</main>

<footer class="footer">
  <div class="footer-nav">
    <a href="index.html" data-i18n="nav_dashboard">Dashboard</a>
    <a href="charts.html" class="analytics" data-i18n="nav_analytics">Analytics</a>
    <a href="docs.html" data-i18n="nav_docs">Documentação</a>
  </div>
  <div data-i18n="footer_created">Criado por Arthur Paixao</div>
  <div style="margin-top:4px;"><a href="https://linkedin.com/in/arthurpaixao/" target="_blank">linkedin.com/in/arthurpaixao/</a></div>
</footer>

<script>
const categoryKeyMap = {
  'SOC':'soc','VULN':'vuln','IAM':'iam','ASM':'asm','PPL':'ppl',
  '3RD':'third_party','FIN':'fin','GRC':'grc','CLOUD':'cloud',
  'APPSEC':'appsec','INFRA':'infra','BISO':'biso','RED':'red','TI':'ti'
};

const SCORE_COLORS = {
  hygiene: '#388BFD', resilience: '#3FB950', human: '#D29922', risk: '#F85149'
};
const DOMAIN_COLORS = [
  '#388BFD','#3FB950','#D29922','#F85149','#BC8CFF',
  '#58A6FF','#56D364','#E3B341','#FF7B72','#D2A8FF',
  '#79C0FF','#7EE787','#F0883E','#FFA657'
];

Chart.defaults.color = '#8B949E';
Chart.defaults.borderColor = '#21262D';
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
Chart.defaults.font.size = 12;

let indicatorsData, historyData;
const chartInstances = {};

function calcPct(indicator) {
  const { direction, target, warningThreshold, value } = indicator;
  if (value == null) return null;
  if (direction === 'higher_better') return Math.min(100, (value / target) * 100);
  if (target === 0) {
    if (!warningThreshold) return value === 0 ? 100 : 0;
    return Math.max(0, 100 - (value / warningThreshold) * 100);
  }
  if (value <= target) return 100;
  return Math.max(0, 100 - ((value - target) / target * 100));
}

function getBarColor(val) {
  if (val >= 85) return '#3FB950';
  if (val >= 50) return '#D29922';
  return '#F85149';
}

function getAllIndicators() {
  return indicatorsData.categories.flatMap(c => c.indicators);
}

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

// ── Chart 1: Executive Scores Line ───────────────────────────────────────────
function renderExecScoresChart() {
  destroyChart('execScores');
  const ctx = document.getElementById('execScores').getContext('2d');
  const hist = historyData.monthsHistorical;
  const pred = historyData.monthsPrediction;
  const allLabels = [...hist, ...pred];
  const nHist = hist.length;

  const scoreKeys = ['hygiene','resilience','human','risk'];
  const scoreNames = {
    hygiene: t('hygiene_score'), resilience: t('resilience_score'),
    human: t('human_score'), risk: t('risk_score')
  };

  const datasets = [];
  scoreKeys.forEach(key => {
    const color = SCORE_COLORS[key];
    const histData = [...historyData.executiveScores[key].historical, ...new Array(pred.length).fill(null)];
    const predValues = historyData.executiveScores[key].prediction;

    // Historical line
    datasets.push({
      label: scoreNames[key],
      data: histData,
      borderColor: color, backgroundColor: 'transparent',
      borderWidth: 2, pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3, segment: { borderDash: ctx => undefined }
    });

    // Prediction line (dashed)
    const predLine = new Array(nHist - 1).fill(null);
    predLine.push(historyData.executiveScores[key].historical[nHist - 1]);
    predValues.forEach(p => predLine.push(p.value));
    datasets.push({
      label: scoreNames[key] + ' (' + t('chart_prediction') + ')',
      data: predLine,
      borderColor: color, backgroundColor: 'transparent',
      borderWidth: 2, borderDash: [6, 3],
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.3
    });

    // Confidence band (upper)
    const upperData = new Array(nHist).fill(null);
    upperData[nHist - 1] = historyData.executiveScores[key].historical[nHist - 1];
    predValues.forEach(p => upperData.push(p.high));
    datasets.push({
      label: '_ci_upper_' + key,
      data: upperData,
      borderColor: 'transparent',
      backgroundColor: color + '18',
      pointRadius: 0, fill: '+1', tension: 0.3
    });

    // Confidence band (lower)
    const lowerData = new Array(nHist).fill(null);
    lowerData[nHist - 1] = historyData.executiveScores[key].historical[nHist - 1];
    predValues.forEach(p => lowerData.push(p.low));
    datasets.push({
      label: '_ci_lower_' + key,
      data: lowerData,
      borderColor: 'transparent',
      backgroundColor: color + '18',
      pointRadius: 0, fill: false, tension: 0.3
    });
  });

  chartInstances.execScores = new Chart(ctx, {
    type: 'line',
    data: { labels: allLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            filter: item => !item.text.startsWith('_ci_'),
            usePointStyle: true
          }
        },
        tooltip: { filter: item => !item.dataset.label.startsWith('_ci_') }
      },
      scales: {
        x: { grid: { color: '#21262D' }, ticks: { maxTicksLimit: 12 } },
        y: { grid: { color: '#21262D' }, min: 0, max: 100, ticks: { callback: v => v + '%' } }
      }
    }
  });
}

// ── Chart 2: Radar Domain Health ─────────────────────────────────────────────
function renderRadarChart() {
  destroyChart('radar');
  const ctx = document.getElementById('radar').getContext('2d');
  const cats = indicatorsData.categories;
  const labels = cats.map(c => c.label);
  const data = cats.map(c => {
    const key = categoryKeyMap[c.label];
    if (!key || !historyData.categories[key]) return 0;
    const hist = historyData.categories[key].historical;
    return hist[hist.length - 1];
  });

  chartInstances.radar = new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        label: t('chart_domain_health'),
        data,
        backgroundColor: 'rgba(56,139,253,0.15)',
        borderColor: '#388BFD',
        borderWidth: 2,
        pointBackgroundColor: data.map(v => getBarColor(v)),
        pointRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 100,
          grid: { color: '#21262D' },
          ticks: { display: false, stepSize: 20 },
          pointLabels: { color: '#8B949E', font: { size: 11 } }
        }
      }
    }
  });
}

// ── Chart 3: Doughnut KPI/KRI ─────────────────────────────────────────────────
function renderDoughnutChart() {
  destroyChart('doughnut');
  const ctx = document.getElementById('doughnut').getContext('2d');
  let kpiTarget = 0, kpiMissed = 0, kriOk = 0, kriAlert = 0;
  getAllIndicators().forEach(ind => {
    if (ind.isImprovement) return;
    const pct = calcPct(ind);
    if (ind.type === 'KPI') { pct >= 85 ? kpiTarget++ : kpiMissed++; }
    else { pct >= 85 ? kriOk++ : kriAlert++; }
  });

  const labels = [t('kpi_on_target'), t('kpi_missed'), t('kri_ok'), t('kri_alert')];
  const colors = ['#3FB950', '#388BFD', '#58A6FF', '#F85149'];

  chartInstances.doughnut = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: [kpiTarget, kpiMissed, kriOk, kriAlert], backgroundColor: colors, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      cutout: '65%'
    }
  });

  // Custom legend
  document.getElementById('doughnut-legend').innerHTML = labels.map((lbl, i) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${colors[i]}"></div>
      <span>${lbl}</span>
    </div>`).join('');
}

// ── Chart 4: Compliance Horizontal Bar ───────────────────────────────────────
function renderComplianceChart() {
  destroyChart('compliance');
  const ctx = document.getElementById('compliance').getContext('2d');
  const cats = indicatorsData.categories.map(c => ({
    label: c.label,
    key: categoryKeyMap[c.label]
  })).filter(c => c.key && historyData.categories[c.key]);

  const sorted = cats
    .map(c => ({ label: c.label, value: historyData.categories[c.key].kpiCompliance }))
    .sort((a, b) => b.value - a.value);

  chartInstances.compliance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(c => c.label),
      datasets: [{
        label: t('chart_compliance'),
        data: sorted.map(c => c.value),
        backgroundColor: sorted.map(c => getBarColor(c.value)),
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { min: 0, max: 100, grid: { color: '#21262D' }, ticks: { callback: v => v + '%' } },
        y: { grid: { display: false } }
      }
    }
  });
}

// ── Chart 5: Annual Grouped Bar ───────────────────────────────────────────────
function renderAnnualChart() {
  destroyChart('annual');
  const ctx = document.getElementById('annual').getContext('2d');
  const labels = historyData.annualLabels;
  const scoreKeys = ['hygiene','resilience','human','risk'];
  const scoreNames = {
    hygiene: t('hygiene_score'), resilience: t('resilience_score'),
    human: t('human_score'), risk: t('risk_score')
  };

  chartInstances.annual = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: scoreKeys.map(key => ({
        label: scoreNames[key],
        data: historyData.executiveScores[key].annual,
        backgroundColor: SCORE_COLORS[key] + 'CC',
        borderColor: SCORE_COLORS[key],
        borderWidth: 1, borderRadius: 3
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { labels: { usePointStyle: true } } },
      scales: {
        x: { grid: { color: '#21262D' } },
        y: { min: 0, max: 100, grid: { color: '#21262D' }, ticks: { callback: v => v + '%' } }
      }
    }
  });
}

// ── Chart 6: Stacked Incidents ────────────────────────────────────────────────
function renderIncidentsChart() {
  destroyChart('incidents');
  const ctx = document.getElementById('incidents').getContext('2d');
  const months = historyData.incidents.months.slice(-12);
  const p1 = historyData.incidents.p1.slice(-12);
  const p2 = historyData.incidents.p2.slice(-12);
  const p3 = historyData.incidents.p3.slice(-12);

  chartInstances.incidents = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: 'P1 Critical', data: p1, backgroundColor: '#F85149CC', borderRadius: 0 },
        { label: 'P2 High',     data: p2, backgroundColor: '#D29922CC', borderRadius: 0 },
        { label: 'P3 Medium',   data: p3, backgroundColor: '#388BFDCC', borderRadius: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { labels: { usePointStyle: true } } },
      scales: {
        x: { stacked: true, grid: { color: '#21262D' } },
        y: { stacked: true, grid: { color: '#21262D' }, ticks: { stepSize: 5 } }
      }
    }
  });
}

// ── Chart 7: Category Trend (tabbed) ─────────────────────────────────────────
let activeTrendTab = null;
function renderTrendChart(catLabel) {
  destroyChart('trend');
  activeTrendTab = catLabel;
  const ctx = document.getElementById('trend').getContext('2d');
  const key = categoryKeyMap[catLabel];
  if (!key || !historyData.categories[key]) return;

  const catData = historyData.categories[key];
  const hist = historyData.monthsHistorical;
  const pred = historyData.monthsPrediction;
  const allLabels = [...hist, ...pred];
  const nHist = hist.length;

  const histLine = [...catData.historical, ...new Array(pred.length).fill(null)];
  const predLine = new Array(nHist - 1).fill(null);
  predLine.push(catData.historical[nHist - 1]);
  catData.prediction.forEach(p => predLine.push(p.value));

  const upperData = new Array(nHist).fill(null);
  upperData[nHist - 1] = catData.historical[nHist - 1];
  catData.prediction.forEach(p => upperData.push(p.high));

  const lowerData = new Array(nHist).fill(null);
  lowerData[nHist - 1] = catData.historical[nHist - 1];
  catData.prediction.forEach(p => lowerData.push(p.low));

  chartInstances.trend = new Chart(ctx, {
    type: 'line',
    data: {
      labels: allLabels,
      datasets: [
        {
          label: t('chart_historical'),
          data: histLine, borderColor: '#388BFD', backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 0, tension: 0.3
        },
        {
          label: t('chart_prediction'),
          data: predLine, borderColor: '#388BFD', backgroundColor: 'transparent',
          borderWidth: 2, borderDash: [6, 3], pointRadius: 0, tension: 0.3
        },
        {
          label: '_ci_upper',
          data: upperData, borderColor: 'transparent', backgroundColor: '#388BFD20',
          pointRadius: 0, fill: '+1', tension: 0.3
        },
        {
          label: '_ci_lower',
          data: lowerData, borderColor: 'transparent', backgroundColor: '#388BFD20',
          pointRadius: 0, fill: false, tension: 0.3
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { labels: { filter: i => !i.text.startsWith('_ci_'), usePointStyle: true } },
        tooltip: { filter: i => !i.dataset.label.startsWith('_ci_') }
      },
      scales: {
        x: { grid: { color: '#21262D' }, ticks: { maxTicksLimit: 12 } },
        y: { min: 0, max: 100, grid: { color: '#21262D' }, ticks: { callback: v => v + '%' } }
      }
    }
  });
}

function renderTabs() {
  const container = document.getElementById('trend-tabs');
  const labels = indicatorsData.categories.map(c => c.label);
  container.innerHTML = labels.map(lbl =>
    `<button class="tab-btn${activeTrendTab === lbl ? ' active' : ''}" data-label="${lbl}">${lbl}</button>`
  ).join('');
  container.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTrendTab = btn.dataset.label;
      renderTabs();
      renderTrendChart(btn.dataset.label);
    });
  });
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <!-- Chart 1: Executive Scores (full width) -->
    <div class="chart-card">
      <div class="chart-title" data-i18n="chart_exec_scores">${t('chart_exec_scores')}</div>
      <div class="chart-container"><canvas id="execScores" height="80"></canvas></div>
    </div>

    <!-- Charts 2+3: Radar + Doughnut -->
    <div class="chart-grid-2">
      <div class="chart-card">
        <div class="chart-title" data-i18n="chart_domain_health">${t('chart_domain_health')}</div>
        <canvas id="radar" height="100"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title" data-i18n="chart_kpi_kri">${t('chart_kpi_kri')}</div>
        <canvas id="doughnut" height="100"></canvas>
        <div class="doughnut-legend" id="doughnut-legend"></div>
      </div>
    </div>

    <!-- Chart 4: Compliance Bar (full width) -->
    <div class="chart-card">
      <div class="chart-title" data-i18n="chart_compliance">${t('chart_compliance')}</div>
      <div class="chart-container" style="height:340px"><canvas id="compliance"></canvas></div>
    </div>

    <!-- Charts 5+6: Annual + Incidents -->
    <div class="chart-grid-2">
      <div class="chart-card">
        <div class="chart-title" data-i18n="chart_annual">${t('chart_annual')}</div>
        <canvas id="annual" height="120"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title" data-i18n="chart_incidents">${t('chart_incidents')}</div>
        <canvas id="incidents" height="120"></canvas>
      </div>
    </div>

    <!-- Chart 7: Category Trend (tabbed) -->
    <div class="chart-card">
      <div class="chart-title" data-i18n="chart_trends">${t('chart_trends')}</div>
      <div class="tab-bar" id="trend-tabs"></div>
      <div class="chart-container"><canvas id="trend" height="80"></canvas></div>
    </div>
  `;

  renderExecScoresChart();
  renderRadarChart();
  renderDoughnutChart();
  renderComplianceChart();
  renderAnnualChart();
  renderIncidentsChart();

  // Default tab = first category (preserve user selection on lang change)
  activeTrendTab = activeTrendTab || indicatorsData.categories[0].label;
  renderTabs();
  renderTrendChart(activeTrendTab);
}

// ── Load ──────────────────────────────────────────────────────────────────────
const _ug = document.getElementById('user-greeting');
if (_ug) { const u = getCurrentUser(); if (u) _ug.textContent = t('welcome_user') + ' ' + u; }

async function loadData() {
  const [ind, hist] = await Promise.all([
    loadIndicatorsData(),
    fetch('data/history.json').then(r => r.json())
  ]);
  indicatorsData = ind;
  historyData = hist;
  renderAll();
  applyLang(getLang());
}

loadData().catch(err => {
  document.getElementById('content').innerHTML =
    `<div class="error" data-i18n="error_loading">${t('error_loading')}</div>`;
  console.error(err);
});

// Cross-tab auto-update when admin saves changes
window.addEventListener('storage', (e) => {
  if (e.key === 'crcc_indicators_override' && historyData) loadData();
});

document.addEventListener('langchange', () => {
  if (indicatorsData && historyData) renderAll();
});
</script>
</body>
